name: Bug Report
description: Report a bug in any LedgerLens repository
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

        For **security vulnerabilities**, do not open a public issue — follow the process in [SECURITY.md](../SECURITY.md) instead.

  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which repository is affected?
      options:
        - Ledgerlens-data
        - Ledgerlens-core
        - Ledegerlens-api
        - Ledgerlens-dashboard
        - Ledgerlens-contract
        - .github (CI/workflows)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Run `python run_pipeline.py ...`
        2. Observe error in ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include error messages, stack traces, or logs.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit / version
      description: Commit SHA or release tag where you observed this.
      placeholder: e.g. abc1234 or v0.2.0

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else relevant — environment, related issues, partial fixes you have tried.

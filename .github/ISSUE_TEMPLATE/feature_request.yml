name: Feature Request
description: Suggest a new feature or improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement to LedgerLens.

        Before submitting, please check that a similar feature request doesn't already exist.

  - type: dropdown
    id: repo
    attributes:
      label: Repository
      description: Which repository would this change affect?
      multiple: true
      options:
        - Ledgerlens-data
        - Ledgerlens-core
        - Ledegerlens-api
        - Ledgerlens-dashboard
        - Ledgerlens-contract
        - .github (CI/workflows)
        - Multiple / cross-repo
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What is the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see. Include any technical ideas if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches? Why do you prefer this one?

  - type: dropdown
    id: cross_repo
    attributes:
      label: Cross-repo impact
      description: Does this change affect the shared RiskScore struct, asset pair format, contract ABI, or risk thresholds?
      options:
        - "No — contained to one repo"
        - "Yes — affects shared contracts (describe in Additional context)"
        - "Unsure"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — references, prior art, related issues.
